services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - trainnet

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_MS: 3600000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 5
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 15
    networks:
      - trainnet

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: train-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - trainnet

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
        echo 'Waiting for Kafka broker...';
        sleep 30;

        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic train_events --partitions 5 --replication-factor 1;
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic station_status --partitions 3 --replication-factor 1;
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic weather_updates --partitions 2 --replication-factor 1;
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic train_alerts --partitions 3 --replication-factor 1;

        echo '✅ Topics ready';
        exit 0;
      "
    networks:
      - trainnet

  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: train-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped
    networks:
      - trainnet

  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    container_name: train-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATA_DIR: /app/data
    volumes:
      - shared-data:/app/data
    restart: unless-stopped
    networks:
      - trainnet

  optimiser:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    container_name: train-optimiser
    depends_on:
      - consumer
    command: ["python", "consumer/optimiser.py"]
    environment:
      DATA_DIR: /app/data
    volumes:
      - shared-data:/app/data
    restart: unless-stopped
    networks:
      - trainnet

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: train-dashboard
    depends_on:
      - consumer
    ports:
      - "8502:8501"
    environment:
      DATA_DIR: /app/data
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - shared-data:/app/data
    restart: unless-stopped
    networks:
      - trainnet

volumes:
  shared-data:

networks:
  trainnet:
    driver: bridge